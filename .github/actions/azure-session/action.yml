name: Azure session
description: Azure CLI login, optional ACR and AKS kubeconfig
inputs:
  creds:
    description: AZURE_CREDENTIALS JSON
    required: true
  acr-name:
    description: ACR name for docker login (omit to skip)
    required: false
    default: ''
  aks-resource-group:
    required: false
    default: ''
  aks-cluster-name:
    required: false
    default: ''

runs:
  using: composite
  steps:
    - uses: azure/login@v2
      with:
        creds: ${{ inputs.creds }}

    - name: ACR login
      if: ${{ inputs.acr-name != '' }}
      shell: bash
      run: az acr login --name "${{ inputs.acr-name }}"

    - name: AKS context
      if: ${{ inputs.aks-resource-group != '' && inputs.aks-cluster-name != '' }}
      uses: azure/aks-set-context@v3
      with:
        resource-group: ${{ inputs.aks-resource-group }}
        cluster-name: ${{ inputs.aks-cluster-name }}
