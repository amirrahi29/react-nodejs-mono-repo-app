# =============================================================================
# Full CD pipeline (single workflow file): Docker build + push to ACR + Helm upgrade on AKS.
# Jobs: build-and-push -> deploy | rollback (manual) | diagnostics (if deploy fails)
# Branch -> namespace + helm/values-<branch>.yaml: main, dev, staging, uat (case-sensitive).
# Required secret: AZURE_CREDENTIALS. Optional KV/WI secrets (no ${{ }} || in YAML — coalesce in shell for older GHES).
# In Actions UI pick workflow name below - this is your main pipeline (not a smoke test).
# =============================================================================
name: "Build, Push & Deploy to AKS"
run-name: "${{ github.ref_name }} | ${{ github.event_name }}"

# Push: only the branches listed (e.g. feature/* does not run). Newer push cancels in-progress run on same branch.
# Manual: Actions -> this workflow -> Run workflow (deploy or rollback).
on:
  push:
    branches:
      - main
      - dev
      - staging
      - uat
  workflow_dispatch:
    inputs:
      operation:
        description: Full pipeline or Helm rollback only
        type: choice
        options: [deploy, rollback]
        default: deploy
      helm_revision:
        description: Rollback revision (blank = previous)
        type: string
        required: false
        default: ""

permissions:
  contents: read
  # Required for actions/upload-artifact (Helm render + deploy-failure diagnostics).
  actions: write

concurrency:
  group: cd-aks-${{ github.repository }}-${{ github.ref_name }}
  cancel-in-progress: true

env:
  # Helm --wait; deploy job timeout-minutes must stay above this.
  HELM_UPGRADE_WAIT_TIMEOUT: 30m
  ACR_NAME: chatregistryapp
  IMAGE_NAME: chat-app
  AKS_CLUSTER_NAME: ChatAppCluster
  AKS_RESOURCE_GROUP: ChatResourceGroup
  HELM_VERSION: v3.14.4
  HELM_RELEASE: chat-app
  HELM_CHART_PATH: ./helm

jobs:
  build-and-push:
    # Do not read github.event.inputs on push (use explicit event check).
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.operation == 'deploy')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      namespace: ${{ steps.meta.outputs.namespace }}
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Image tag and namespace
        id: meta
        run: |
          BRANCH=${GITHUB_REF#refs/heads/}
          SHORT_SHA=$(git rev-parse --short HEAD)
          TAG="${BRANCH}-${SHORT_SHA}"
          echo "IMAGE_TAG=${TAG}" >> "$GITHUB_ENV"
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "namespace=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${ACR_NAME}.azurecr.io/${IMAGE_NAME}:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Azure login (service principal)
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        run: az acr login --name "${ACR_NAME}"

      - name: Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.image_ref }}
          build-args: |
            GIT_SHA=${{ github.sha }}
          provenance: false

      - name: Summary
        run: |
          echo "## Image" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | \`${IMAGE_TAG}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Ref | \`${{ steps.meta.outputs.image_ref }}\` |" >> "$GITHUB_STEP_SUMMARY"

  deploy:
    needs: build-and-push
    if: always() && needs.build-and-push.result == 'success'
    runs-on: ubuntu-latest
    # GitHub kills the job if exceeded; must stay above helm --wait + login/lint/upload margin.
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: AKS kubeconfig
        uses: azure/aks-set-context@v5
        with:
          resource-group: ${{ env.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER_NAME }}

      - name: Helm CLI
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Helm lint and template
        env:
          NS: ${{ needs.build-and-push.outputs.namespace }}
          TAG: ${{ needs.build-and-push.outputs.image_tag }}
          VAULT_URL: ${{ secrets.AZURE_KEY_VAULT_URL }}
          _KVU_A: ${{ secrets.KEY_VAULT_USERNAME_SECRET_NAME }}
          _KVU_B: ${{ secrets.KEY_VAULT_USERNAME_SECRET }}
          _KVP_A: ${{ secrets.KEY_VAULT_PASSWORD_SECRET_NAME }}
          _KVP_B: ${{ secrets.KEY_VAULT_PASSWORD_SECRET }}
          WI_CLIENT_ID: ${{ secrets.AZURE_WORKLOAD_CLIENT_ID }}
          WI_SERVICE_ACCOUNT: ${{ secrets.AKS_WORKLOAD_SERVICE_ACCOUNT }}
        run: |
          KV_USER_KEY="${_KVU_A}"
          [ -z "$KV_USER_KEY" ] && KV_USER_KEY="${_KVU_B}"
          KV_PASS_KEY="${_KVP_A}"
          [ -z "$KV_PASS_KEY" ] && KV_PASS_KEY="${_KVP_B}"
          export KV_USER_KEY KV_PASS_KEY
          helm lint "${HELM_CHART_PATH}"
          source scripts/ci/helm-keyvault-args.sh
          helm template "${HELM_RELEASE}" "${HELM_CHART_PATH}" \
            -f "${HELM_CHART_PATH}/values-${NS}.yaml" \
            --set "image.repository=${ACR_NAME}.azurecr.io/${IMAGE_NAME}" \
            --set "image.tag=${TAG}" \
            "${HELM_KV_ARGS[@]}" \
            > rendered-manifest.yaml

      - name: Upload rendered manifest
        uses: actions/upload-artifact@v4
        with:
          name: helm-rendered-${{ needs.build-and-push.outputs.namespace }}-${{ github.sha }}
          path: rendered-manifest.yaml
          retention-days: 14

      - name: Helm upgrade (install)
        env:
          NS: ${{ needs.build-and-push.outputs.namespace }}
          TAG: ${{ needs.build-and-push.outputs.image_tag }}
          VAULT_URL: ${{ secrets.AZURE_KEY_VAULT_URL }}
          _KVU_A: ${{ secrets.KEY_VAULT_USERNAME_SECRET_NAME }}
          _KVU_B: ${{ secrets.KEY_VAULT_USERNAME_SECRET }}
          _KVP_A: ${{ secrets.KEY_VAULT_PASSWORD_SECRET_NAME }}
          _KVP_B: ${{ secrets.KEY_VAULT_PASSWORD_SECRET }}
          WI_CLIENT_ID: ${{ secrets.AZURE_WORKLOAD_CLIENT_ID }}
          WI_SERVICE_ACCOUNT: ${{ secrets.AKS_WORKLOAD_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail
          KV_USER_KEY="${_KVU_A}"
          [ -z "$KV_USER_KEY" ] && KV_USER_KEY="${_KVU_B}"
          KV_PASS_KEY="${_KVP_A}"
          [ -z "$KV_PASS_KEY" ] && KV_PASS_KEY="${_KVP_B}"
          export KV_USER_KEY KV_PASS_KEY
          source scripts/ci/helm-keyvault-args.sh
          echo "Helm --wait (timeout=${HELM_UPGRADE_WAIT_TIMEOUT}) is quiet until pods are Ready."
          echo "Light snapshots every ~90s (fewer API calls than Helm's own wait)."
          (
            sleep 45
            while true; do
              echo "::group::Cluster snapshot $(date -u +%H:%M:%SZ)"
              kubectl get pods -n "${NS}" -o wide 2>/dev/null || true
              kubectl get events -n "${NS}" --sort-by=.lastTimestamp 2>/dev/null | tail -8 || true
              echo "::endgroup::"
              sleep 90
            done
          ) &
          HB_PID=$!
          cleanup() { kill "$HB_PID" 2>/dev/null || true; wait "$HB_PID" 2>/dev/null || true; }
          trap cleanup EXIT
          helm upgrade --install "${HELM_RELEASE}" "${HELM_CHART_PATH}" \
            --namespace "${NS}" \
            --create-namespace \
            -f "${HELM_CHART_PATH}/values-${NS}.yaml" \
            --set "image.repository=${ACR_NAME}.azurecr.io/${IMAGE_NAME}" \
            --set "image.tag=${TAG}" \
            "${HELM_KV_ARGS[@]}" \
            --wait --timeout "${HELM_UPGRADE_WAIT_TIMEOUT}" --atomic --cleanup-on-fail \
            --history-max 15

      - name: Summary
        env:
          NS: ${{ needs.build-and-push.outputs.namespace }}
          TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          echo "## Deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "| Namespace | \`${NS}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | \`${TAG}\` |" >> "$GITHUB_STEP_SUMMARY"
          helm history "${HELM_RELEASE}" -n "${NS}" --max 3 >> "$GITHUB_STEP_SUMMARY" || true

  rollback:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.operation == 'rollback'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: AKS kubeconfig
        uses: azure/aks-set-context@v5
        with:
          resource-group: ${{ env.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER_NAME }}

      - name: Helm CLI
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Helm rollback
        env:
          NS: ${{ github.ref_name }}
          REV: ${{ github.event.inputs.helm_revision }}
        run: |
          if [ -z "$REV" ]; then
            helm rollback "${HELM_RELEASE}" --namespace "${NS}" --wait --timeout 5m
          else
            helm rollback "${HELM_RELEASE}" "$REV" --namespace "${NS}" --wait --timeout 5m
          fi
          kubectl rollout status "deployment/${HELM_RELEASE}" -n "${NS}" --timeout=5m

      - name: Summary
        env:
          NS: ${{ github.ref_name }}
        run: |
          echo "## Helm rollback" >> "$GITHUB_STEP_SUMMARY"
          helm history "${HELM_RELEASE}" -n "${NS}" --max 5 >> "$GITHUB_STEP_SUMMARY"

  diagnostics:
    needs: [build-and-push, deploy]
    if: always() && needs.build-and-push.result == 'success' && needs.deploy.result == 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: AKS kubeconfig
        uses: azure/aks-set-context@v5
        with:
          resource-group: ${{ env.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER_NAME }}

      - name: Collect cluster diagnostics
        env:
          NS: ${{ needs.build-and-push.outputs.namespace }}
        run: |
          mkdir -p diag
          helm history "${HELM_RELEASE}" -n "${NS}" --max 10 > diag/helm-history.txt 2>&1 || true
          kubectl get pods,svc,events -n "${NS}" -o wide > diag/cluster.txt 2>&1 || true
          kubectl describe deployment "${HELM_RELEASE}" -n "${NS}" > diag/describe-deploy.txt 2>&1 || true

      - name: Upload diagnostics artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-failure-${{ needs.build-and-push.outputs.namespace }}-${{ github.run_id }}
          path: diag/
          retention-days: 7

      - name: Summary
        env:
          NS: ${{ needs.build-and-push.outputs.namespace }}
        run: |
          echo "## Deploy failed - see artifact deploy-failure-*" >> "$GITHUB_STEP_SUMMARY"
          echo "Namespace: \`${NS}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Atomic rollback may have run; check helm history in the artifact." >> "$GITHUB_STEP_SUMMARY"
