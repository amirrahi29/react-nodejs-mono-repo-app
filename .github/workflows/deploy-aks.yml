# Multi-env: dev / staging / uat → ACR image + Helm deploy (React + Express, single image)
# Azure resources (portal): ACR ChatRegistryApp → chatregistryapp.azurecr.io | AKS ChatAppCluster | RG ChatResourceGroup | Sub dde8a869-f29f-41ae-90ea-0047779211e6
name: Build, Push & Deploy to AKS

on:
  push:
    branches:
      - main
      - dev
      - staging
      - uat
  # Actions tab → workflow → "Run workflow" (push ke bina test karne ke liye)
  workflow_dispatch:

env:
  # Login server: chatregistryapp.azurecr.io (Container registry: ChatRegistryApp, RG ChatResourceGroup)
  ACR_NAME: chatregistryapp
  IMAGE_NAME: deployment-app
  AKS_CLUSTER_NAME: ChatAppCluster
  AKS_RESOURCE_GROUP: ChatResourceGroup

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      namespace: ${{ steps.meta.outputs.namespace }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set image tag and namespace
        id: meta
        run: |
          BRANCH=${GITHUB_REF#refs/heads/}
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "IMAGE_TAG=${BRANCH}-${SHORT_SHA}" >> $GITHUB_ENV
          echo "image_tag=${BRANCH}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "namespace=${BRANCH}" >> $GITHUB_OUTPUT

      - name: Login to ACR
        run: az acr login --name $ACR_NAME

      - name: Build image (web build + Node API)
        run: |
          echo "Building: $ACR_NAME.azurecr.io/$IMAGE_NAME:$IMAGE_TAG"
          docker build -t $ACR_NAME.azurecr.io/$IMAGE_NAME:$IMAGE_TAG .

      - name: Push image to ACR
        run: docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:$IMAGE_TAG

      - name: Image summary
        run: |
          echo "Pushed ${ACR_NAME}.azurecr.io/${IMAGE_NAME}:${IMAGE_TAG}"

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS kubeconfig
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER_NAME }}

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Helm upgrade (deployment-app)
        run: |
          NS='${{ needs.build-and-push.outputs.namespace }}'
          helm upgrade --install deployment-app ./helm \
            --namespace "$NS" \
            --create-namespace \
            -f "helm/values-${NS}.yaml" \
            --set image.repository=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --wait --timeout 5m

      - name: Deploy summary
        run: |
          echo "Namespace: ${{ needs.build-and-push.outputs.namespace }}"
          echo "Chart: ./helm | Release: deployment-app"
          echo "Tag: ${{ needs.build-and-push.outputs.image_tag }}"
