# Minimal: if this never runs on push, Actions is off, wrong folder, or branch filter mismatch.
name: CI push detect
on:
  push:
    branches:
      - main
      - dev
      - staging
      - uat
jobs:
  ping:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Show ref
        run: |
          echo "ref=${GITHUB_REF} ref_name=${GITHUB_REF_NAME} sha=${GITHUB_SHA}"
