# Staging — namespace `staging`. Tag `staging-<sha>`.
# Optional creds: kubectl create secret generic chat-app-credentials -n staging \
#   --from-literal=APP_USERNAME=x --from-literal=APP_PASSWORD=y
replicaCount: 2

extraEnv:
  - name: APP_ENV
    value: staging

podAnnotations:
  environment: staging

resources:
  limits:
    cpu: 400m
    memory: 384Mi
  requests:
    cpu: 75m
    memory: 96Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 75
  targetMemoryUtilizationPercentage: ""

credentialsSecret:
  enabled: true
  name: chat-app-credentials
  optional: true
