# Staging — integration / QA: 2 replicas, between dev and UAT on resources, HPA for load checks
replicaCount: 2

extraEnv:
  - name: APP_ENV
    value: staging

podAnnotations:
  environment: staging

resources:
  limits:
    cpu: 400m
    memory: 384Mi
  requests:
    cpu: 75m
    memory: 96Mi

service:
  type: LoadBalancer

ingress:
  enabled: false
  className: nginx
  hosts: []

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 75
  targetMemoryUtilizationPercentage: ""
