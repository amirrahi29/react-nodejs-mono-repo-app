# UAT — pre-prod: prod-like resources, HPA before production.
replicaCount: 2

extraEnv:
  - name: APP_ENV
    value: uat

podAnnotations:
  environment: uat

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: ""
