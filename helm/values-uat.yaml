# UAT — namespace `uat`. Tag `uat-<sha>`.
# Secrets: GitHub AZURE_KEY_VAULT_URL + WI, or K8s secret (optional):
# kubectl create secret generic chat-app-credentials -n uat --from-literal=APP_USERNAME=x --from-literal=APP_PASSWORD=y
replicaCount: 2

extraEnv:
  - name: APP_ENV
    value: uat

podAnnotations:
  environment: uat

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: ""

credentialsSecret:
  enabled: true
  name: chat-app-credentials
  optional: true
