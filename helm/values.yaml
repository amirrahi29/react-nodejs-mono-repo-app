replicaCount: 2

image:
  repository: chatregistryapp.azurecr.io/chat-app
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: LoadBalancer
  port: 80
  targetPort: 8080
  annotations: {}

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts: []
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: ""

# Merged into pod template labels (not selectors).
podLabels:
  app.kubernetes.io/part-of: chat-app

podAnnotations: {}

# Injected as container env (set per env file, e.g. APP_ENV).
extraEnv: []

# Azure Key Vault (DefaultAzureCredential — use Workload Identity + RBAC on the vault).
keyVault:
  enabled: false
  vaultUrl: ""
  usernameSecretName: username
  passwordSecretName: password
  azureClientId: ""

# Optional: load APP_USERNAME / APP_PASSWORD from an existing K8s secret (when not using Key Vault).
credentialsSecret:
  enabled: false
  name: chat-app-credentials
  optional: false

# Set when using AKS Workload Identity (service account must exist + federated credential).
serviceAccount:
  name: ""

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}

livenessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /api/ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 6
