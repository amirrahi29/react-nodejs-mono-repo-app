# Production (main) — namespace `main`. Chart default resources; HPA 2–8.
replicaCount: 2

extraEnv:
  - name: APP_ENV
    value: production

podAnnotations:
  environment: production

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: ""
