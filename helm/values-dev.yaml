replicaCount: 1

extraEnv:
  - name: APP_ENV
    value: dev

resources:
  limits:
    cpu: 250m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

service:
  type: LoadBalancer

ingress:
  enabled: false
  className: nginx
  hosts: []

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 2
